<!DOCTYPE html>
<html>
<head>
    <title>Order Filtering</title>
</head>
<body>

<h2>Orders greater than ₹1000</h2>
<p id="result"></p>

<script>
const orders = [450, 1200, 700, 3000, 1500];

// filter orders greater than 1000
const filteredOrders = orders.filter(order => order > 1000);

// display result
document.getElementById("result").innerHTML = filteredOrders;
</script>

</body>
</html>
