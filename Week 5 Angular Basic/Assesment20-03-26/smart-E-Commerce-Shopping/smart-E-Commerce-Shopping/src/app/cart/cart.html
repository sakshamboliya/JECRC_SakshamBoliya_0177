<div class="section">
  <h2>Cart</h2>

  <div class="card" *ngFor="let item of cart">

    <div class="cart-item">
      <div>
        <p><b>{{item.name}}</b></p>
        <p>₹{{item.price}}</p>
      </div>

      <div>
        <button class="btn-secondary quantity-btn" (click)="update.emit({item: item, change: -1})">-</button>
        {{item.quantity}}
        <button class="btn-secondary quantity-btn" (click)="update.emit({item: item, change: 1})">+</button>
      </div>

      <button class="btn-danger" (click)="remove.emit(item.id)">
        Remove
      </button>
    </div>

  </div>

  <div class="total">Total: ₹{{getTotal()}}</div>
</div>
