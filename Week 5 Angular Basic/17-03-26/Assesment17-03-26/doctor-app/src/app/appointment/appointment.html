<h2>Doctor Appointment</h2>

<input placeholder="Patient Name" [(ngModel)]="patientName"><br><br>

<select [(ngModel)]="doctor">
  <option value="">Select Doctor</option>
  <option *ngFor="let d of doctors">{{ d }}</option>
</select><br><br>

<input type="date" [(ngModel)]="date" [min]="today()"><br><br>

<select [(ngModel)]="type" (change)="calculateFee()">
  <option value="">Consultation Type</option>
  <option>Online</option>
  <option>Offline</option>
</select><br><br>

<textarea placeholder="Symptoms" [(ngModel)]="symptoms"></textarea><br><br>

<h3>Fee: ₹{{ fee }}</h3>

<h3>Summary:</h3>
<p>Name: {{ patientName }}</p>
<p>Doctor: {{ doctor }}</p>
<p>Date: {{ date }}</p>
<p>Type: {{ type }}</p>
<p>Symptoms: {{ symptoms }}</p>

<button (click)="submit()">Book Appointment</button>

<h2>{{ message }}</h2>
