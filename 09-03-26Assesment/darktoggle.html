<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode Toggle</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:white;
    color:black;
    text-align:center;
    padding:50px;
    transition:0.3s;
}

button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

/* Dark Mode Style */

.dark{
    background:black;
    color:white;
}

</style>
</head>

<body>

<h1>Dark Mode Toggle Example</h1>

<button id="darkMode">Toggle Dark Mode</button>

<script>

document.getElementById("darkMode").addEventListener("click", () => {

    document.body.classList.toggle("dark");

});

</script>

</body>
</html>
