<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Keyboard Event</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

input{
    padding:10px;
    width:250px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
}

h2{
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>Search Product</h2>

<input type="text" id="searchBox" placeholder="Search product">

</div>

<script>

document.getElementById("searchBox").addEventListener("keydown", (e) => {

    if(e.key === "Enter"){

        console.log("Search triggered");

        alert("Searching product...");

    }

});

</script>

</body>
</html>
