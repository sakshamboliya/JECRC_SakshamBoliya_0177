<div class="modal-backdrop" (click)="close.emit()">
  <div class="modal-panel" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <span class="modal-title">New Transaction</span>
      <button class="modal-close" (click)="close.emit()">✕</button>
    </div>

    <div class="modal-body">
      <div class="field">
        <label>Date</label>
        <input type="date" [(ngModel)]="form.date" required />
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" [(ngModel)]="form.description"
               placeholder="Transaction description" required />
      </div>
      <div class="field">
        <label>Type</label>
        <select [(ngModel)]="form.type">
          <option [value]="0">Credit</option>
          <option [value]="1">Debit</option>
        </select>
      </div>
      <div class="field">
        <label>Amount ($)</label>
        <input type="number" [(ngModel)]="form.amount"
               min="0" step="0.01" placeholder="0.00" required />
      </div>
      <div class="field">
        <label>Balance</label>
        <input type="text" [(ngModel)]="form.balance"
               placeholder="$0.00" required />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="close.emit()">Cancel</button>
      <button class="btn-save"   (click)="onSubmit()">Add Transaction</button>
    </div>

  </div>
</div>
