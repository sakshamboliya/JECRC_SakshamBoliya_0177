<ul>
  <li *ngFor="let task of tasks; let i = index; trackBy: trackByFn">
    <div class="task-content">
      <input
        type="checkbox"
        [checked]="task.completed"
        (change)="toggle(task)"
      />
      <span [class.done]="task.completed">
        {{ task.title }}
      </span>
    </div>
    <div class="actions">
      <button class="edit-btn" (click)="editTask.emit(task)">
        Edit
      </button>
      <button class="delete-btn" (click)="delete(task.id!)">
        Delete
      </button>
    </div>
  </li>
</ul>
