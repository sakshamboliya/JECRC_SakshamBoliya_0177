<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Functions Demo</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:40px;
    background:#f4f6f8;
}

h1{
    color:#333;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result-box{
    margin-top:20px;
    padding:15px;
    background:white;
    border-radius:6px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

ul{
    margin-top:10px;
}
</style>

</head>

<body>

<h1>Javascript Arrow Functions and Array Methods</h1>
<p>Click the button to run different JS functions</p>

<button id="run-btn">Run JS Operations</button>

<div class="result-box">
<h3>Results</h3>
<ul id="output"></ul>
</div>

<script>

const numbers = [1,2,3,4,5,6,7];

const people = [
{ name : "Alice", age : 25},
{ name : "Bob", age : 32},
{ name : "Charlie", age : 27},
{ name : "David", age : 35}
];

const runBtn = document.getElementById("run-btn");
const output = document.getElementById("output");

runBtn.addEventListener('click', () => {

output.innerHTML = "";

// Arrow Function with map
const squaredNumbers = numbers.map(num => num * num);

const squaredList = document.createElement('li');
squaredList.textContent = "Squared Numbers: " + squaredNumbers.join(", ");
output.appendChild(squaredList);


// Arrow Function with filter
const adults = people.filter(person => person.age >= 30);

const adultList = document.createElement('li');
adultList.textContent = "Adults (Age >=30): " + adults.map(p => p.name).join(", ");
output.appendChild(adultList);


// Arrow Function with reduce
const totalAge = people.reduce((sum, person) => sum + person.age, 0);

const totalList = document.createElement('li');
totalList.textContent = "Total Age of People: " + totalAge;
output.appendChild(totalList);

});

</script>

</body>
</html>
